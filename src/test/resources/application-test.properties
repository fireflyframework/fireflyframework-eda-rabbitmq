# Test configuration for EDA RabbitMQ transport integration tests
firefly.eda.enabled=true
firefly.eda.publishers.enabled=true
firefly.eda.consumer.enabled=true
firefly.eda.publishers.application-event.enabled=true
firefly.eda.publishers.rabbitmq.default.enabled=true
firefly.eda.consumer.rabbitmq.default.enabled=true

# Debug logging
logging.level.org.fireflyframework.eda=DEBUG
logging.level.org.fireflyframework.eda.consumer.rabbitmq=DEBUG
logging.level.org.fireflyframework.eda.listener=DEBUG
logging.level.org.fireflyframework.eda.publisher.rabbitmq=DEBUG
logging.level.org.fireflyframework.eda.testconfig=DEBUG
